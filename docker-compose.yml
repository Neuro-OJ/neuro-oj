services:
  redis:
    image: redis:7-alpine
    container_name: noj-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: noj-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: noj
      POSTGRES_PASSWORD: noj
      POSTGRES_DB: noj
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
