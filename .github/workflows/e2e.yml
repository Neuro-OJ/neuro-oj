# =============================================================================
# Neuro OJ — 全链路 E2E 测试
#
# 在每个 PR 和推送到 main 时运行完整的端到端测试：
#   - noj-tests 全量 E2E（70 API + 管道 + 队列可见性测试）
#   - noj-judge Docker 沙箱 E2E（12 个测试）
#
# 使用 Docker Compose 编排完整评测栈（noj-core + noj-judge + PostgreSQL + Redis）。
#
# 技术栈：Deno + Rust + Docker Compose
# 运行时间：首次 ~15min，缓存命中后 ~5-8min
# =============================================================================

name: E2E

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_PROJECT_NAME: noj-e2e
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"
  E2E_BASE_URL: http://localhost:8099
  E2E_CORE_PORT: 8099
  E2E_DB_URL: postgres://e2e:e2e@localhost:5433/e2e
  E2E_REDIS_URL: redis://localhost:6380/1
  JWT_SECRET: e2e-ci-secret-01234567890123456789
  NOJ_RUN_E2E: "1"
  BCRYPT_SALT_ROUNDS: 4
  DENO_DIR: ${{ github.workspace }}/noj-core/.deno_cache

jobs:
  e2e:
    name: Full Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 安装工具链 ────────────────────────────

      - name: 安装 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # ── 设置 Docker BuildKit（用于镜像构建缓存）──

      - name: 设置 Docker BuildKit
        uses: docker/setup-buildx-action@v3

      # ── 缓存依赖 ──────────────────────────────

      - name: 缓存 Deno 依赖
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/noj-core/.deno_cache
          key: deno-${{ hashFiles('noj-core/deno.lock') }}
          restore-keys: |
            deno-

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            noj-judge/target
          key: cargo-e2e-${{ hashFiles('noj-judge/Cargo.lock') }}
          restore-keys: |
            cargo-e2e-

      # ════════════════════════════════════════════
      # 1. 构建基础设施：支持包 + 评测镜像（带 Docker 缓存）
      # ════════════════════════════════════════════

      - name: 安装 Deno 依赖
        working-directory: noj-core
        run: deno install

      - name: 构建题目支持包 (packages/*.zip)
        working-directory: noj-core
        run: deno task build-packages
        env:
          DENO_DIR: ${{ env.DENO_DIR }}

      - name: 构建评测镜像 (noj-judge-python, 带 GHA 缓存)
        uses: docker/build-push-action@v6
        with:
          context: noj-judge
          file: noj-judge/docker/python/Dockerfile
          tags: noj-judge-python
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建 Docker Compose 镜像 (noj-core, 带 GHA 缓存)
        uses: docker/build-push-action@v6
        with:
          context: noj-core
          file: noj-core/Dockerfile.e2e
          tags: noj-e2e-core
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建 Docker Compose 镜像 (noj-judge, 带 GHA 缓存)
        uses: docker/build-push-action@v6
        with:
          context: noj-judge
          file: noj-judge/Dockerfile.e2e
          tags: noj-e2e-judge
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 初始化 MinIO bucket
        run: |
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME up -d minio minio-init

      # ════════════════════════════════════════════
      # 2. 启动 E2E 评测栈（使用预构建镜像，不触发 rebuild）
      # ════════════════════════════════════════════

      - name: 启动评测栈（使用预构建镜像，不触发 rebuild）
        run: |
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME up -d --no-build
          # 修复 finding C4 + C8：原版用 timeout 60 bash + curl 探测，
          # 且失败用 `|| echo ⚠` 静默吞下，导致后续 70+ 测试在 noj-core
          # 未起来时跑出 ECONNREFUSED 伪装成测试失败。
          #
          # 改用 docker inspect 轮询 Health.Status：
          #   - status=healthy → 成功
          #   - 容器已退出（main.ts 启动失败 / migration 失败等）→ 立即诊断退出
          #
          # 一改前：noj-core 启动时跑 migrate + seed（实测 25-30 min），
          # 一改后：拆分出 noj-migrate one-shot 提前跑 migrate + seed，
          # noj-core 容器只启动 HTTP server + deno runtime（启动 ~4 min）。
          # v13 fix：放弃 deno compile AOT（Alpine musl vs glibc binary 兼容性
          # 问题过多），改用 deno cache 预热 + bash loop 拉长到 600s 兜底
          # cold-start。
          echo "等待 noj-core 健康（bash 轮询 docker inspect，600s 超时）..."
          for i in $(seq 1 600); do
            status=$(docker inspect --format='{{.State.Health.Status}}' \
                     noj-e2e-core 2>/dev/null || echo "missing")
            if [ "$status" = "healthy" ]; then
              echo "✅ noj-core 健康就绪 ($i s)"
              exit 0
            fi
            # v12 fix：原 `! docker ps` 检查在容器还没 created 时误报
            # "已退出"（race condition）。改用 docker inspect State.Status
            # 只判 exited/dead 状态。
            state=$(docker inspect --format='{{.State.Status}}' \
                    noj-e2e-core 2>/dev/null || echo "missing")
            if [ "$state" = "exited" ] || [ "$state" = "dead" ]; then
              echo "::error::noj-core 容器已退出，状态=$state (health=$status)"
              docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME \
                logs --tail=100 noj-core
              exit 1
            fi
            sleep 1
          done
          echo "::error::noj-core 未在 600s 内健康就绪 (status=$status)"
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME \
            logs --tail=100 noj-core
          exit 1

      # ════════════════════════════════════════════
      # 3. noj-tests E2E 测试
      # ════════════════════════════════════════════

      - name: E2E 测试 (noj-tests)
        working-directory: noj-tests
        run: deno test -A e2e/
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}

      # ════════════════════════════════════════════
      # 4. noj-judge Docker 沙箱 E2E 测试（一次性编译）
      # ════════════════════════════════════════════

      - name: 编译 Judge E2E 测试目标
        working-directory: noj-judge
        run: cargo build --tests

      - name: Judge E2E 测试（Docker 沙箱）
        working-directory: noj-judge
        run: |
          # set -euo pipefail：任一 cargo test 失败立即终止整个 job，
          # 修复原版 for 循环吞掉中间失败、只在最后一个目标失败时退出 0 的问题。
          set -euo pipefail
          # 必须列出全部 6 个 e2e_* 测试文件；之前漏掉的 e2e_container_pool 正是
          # 2026-07-02 container-pool-simplify 重构过的关键路径。
          for target in \
            e2e_docker_basic \
            e2e_resource_limits \
            e2e_security_isolation \
            e2e_support_package \
            e2e_problem_limits \
            e2e_container_pool; do
            echo ""
            echo "───────────────────────────────────────"
            echo "  $target"
            echo "───────────────────────────────────────"
            REDIS_URL=$E2E_REDIS_URL NOJ_RUN_E2E=1 cargo test --test "$target" -- --ignored --test-threads=1
          done
        env:
          REDIS_URL: ${{ env.E2E_REDIS_URL }}

      # ════════════════════════════════════════════
      # 6. 诊断日志（即使前面失败也执行）
      # ════════════════════════════════════════════

      - name: 输出 noj-judge 日志
        if: always()
        run: |
          echo "=== noj-judge 日志 ==="
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME logs --tail=100 noj-judge 2>&1 || echo "容器可能未启动"

      - name: 输出 noj-core 日志
        if: always()
        run: |
          echo "=== noj-core 日志 ==="
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME logs --tail=100 noj-core 2>&1 || echo "容器可能未启动"

      # 失败时把诊断日志落盘 + 上传为 GitHub Actions artifact
      # (修复 finding M7/S8)。原版只 echo 到 GHA log，contributor 必须本地复现才能排查。
      # 改写为：docker logs 重定向到文件，再 upload-artifact。
      - name: 保存 + 上传 noj-judge 日志
        if: always()
        run: |
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME logs --tail=500 noj-judge > noj-judge.log 2>&1 || echo "noj-judge may not be running"

      - name: 保存 + 上传 noj-core 日志
        if: always()
        run: |
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME logs --tail=500 noj-core > noj-core.log 2>&1 || echo "noj-core may not be running"

      - name: 上传诊断日志
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-pipeline-logs
          path: |
            noj-judge.log
            noj-core.log
            noj-judge/target/**/test-*.log
            noj-judge/target/**/deps/
            /tmp/noj-work/
          retention-days: 7
          if-no-files-found: ignore
        continue-on-error: true

      # ════════════════════════════════════════════
      # 7. 清理
      # ════════════════════════════════════════════

      - name: 清理评测栈
        if: always()
        run: |
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME down -v
