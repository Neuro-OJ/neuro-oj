# =============================================================================
# Neuro OJ — 全链路 E2E 测试
#
# 在每个 PR 和推送到 main 时运行完整的端到端测试：
#   - noj-tests 全量 E2E（70 API + 管道 + 队列可见性测试）
#   - noj-judge Docker 沙箱 E2E（12 个测试）
#
# 使用 Docker Compose 编排完整评测栈（noj-core + noj-judge + PostgreSQL + Redis）。
#
# 技术栈：Deno + Rust + Docker Compose
# 运行时间：首次 ~15min，缓存命中后 ~5-8min
# =============================================================================

name: E2E

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_PROJECT_NAME: noj-e2e
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"
  E2E_BASE_URL: http://localhost:8099
  E2E_CORE_PORT: 8099
  E2E_DB_URL: postgres://e2e:e2e@localhost:5433/e2e
  E2E_REDIS_URL: redis://localhost:6380/1
  JWT_SECRET: e2e-ci-secret-01234567890123456789
  NOJ_RUN_E2E: "1"
  BCRYPT_SALT_ROUNDS: 4
  DENO_DIR: ${{ github.workspace }}/noj-core/.deno_cache

jobs:
  e2e:
    name: Full Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 安装工具链 ────────────────────────────

      - name: 安装 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # ── 设置 Docker BuildKit（用于镜像构建缓存）──

      - name: 设置 Docker BuildKit
        uses: docker/setup-buildx-action@v3

      # ── 缓存依赖 ──────────────────────────────

      - name: 缓存 Deno 依赖
        uses: actions/cache@v4
        with:
          # cache key 同时 hash deno.lock 和 deno.json（修复 finding P7）：
          # 单 hashFiles('deno.lock') 在 imports map 变更时不刷缓存，
          # 会用到旧的下载模块。
          path: ${{ github.workspace }}/noj-core/.deno_cache
          key: deno-${{ hashFiles('noj-core/deno.lock', 'noj-core/deno.json') }}
          restore-keys: |
            deno-

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            noj-judge/target
          key: cargo-e2e-${{ hashFiles('noj-judge/Cargo.lock') }}
          restore-keys: |
            cargo-e2e-

      # ════════════════════════════════════════════
      # 1. 构建基础设施：支持包 + 评测镜像（带 Docker 缓存）
      # ════════════════════════════════════════════

      - name: 安装 Deno 依赖
        working-directory: noj-core
        run: deno install

      - name: 构建题目支持包 (packages/*.zip)
        working-directory: noj-core
        run: deno task build-packages
        env:
          DENO_DIR: ${{ env.DENO_DIR }}

      - name: 构建评测镜像 (noj-judge-python, 带 GHA 缓存)
        uses: docker/build-push-action@v6
        with:
          context: noj-judge
          file: noj-judge/docker/python/Dockerfile
          tags: noj-judge-python
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建 Docker Compose 镜像 (noj-core, 带 GHA 缓存)
        uses: docker/build-push-action@v6
        with:
          context: noj-core
          file: noj-core/Dockerfile.e2e
          tags: noj-e2e-core
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建 Docker Compose 镜像 (noj-judge, 带 GHA 缓存)
        uses: docker/build-push-action@v6
        with:
          context: noj-judge
          file: noj-judge/Dockerfile.e2e
          tags: noj-e2e-judge
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 初始化 MinIO bucket
        run: |
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME up -d minio minio-init

      # ════════════════════════════════════════════
      # 2. 启动 E2E 评测栈（使用预构建镜像，不触发 rebuild）
      # ════════════════════════════════════════════

      - name: 启动评测栈（使用预构建镜像，不触发 rebuild）
        run: |
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME up -d --no-build
          echo "等待 noj-core 就绪..."
          timeout 60 bash -c '
            until curl -sf $E2E_BASE_URL/health > /dev/null 2>&1; do
              printf "."
              sleep 1
            done
          ' && echo "✅ noj-core 就绪" || echo "⚠ noj-core 未在 60s 内就绪"

      # ════════════════════════════════════════════
      # 3. noj-tests E2E 测试
      # ════════════════════════════════════════════

      - name: E2E 测试 (noj-tests)
        working-directory: noj-tests
        run: deno test -A e2e/
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}

      # ════════════════════════════════════════════
      # 4. noj-judge Docker 沙箱 E2E 测试（一次性编译）
      # ════════════════════════════════════════════

      - name: 编译 Judge E2E 测试目标
        working-directory: noj-judge
        run: cargo build --tests

      - name: Judge E2E 测试（Docker 沙箱）
        working-directory: noj-judge
        run: |
          for target in e2e_docker_basic e2e_resource_limits e2e_security_isolation e2e_support_package e2e_problem_limits; do
            echo ""
            echo "───────────────────────────────────────"
            echo "  $target"
            echo "───────────────────────────────────────"
            REDIS_URL=$E2E_REDIS_URL NOJ_RUN_E2E=1 cargo test --test "$target" -- --ignored --test-threads=1
          done
        env:
          REDIS_URL: ${{ env.E2E_REDIS_URL }}

      # ════════════════════════════════════════════
      # 6. 诊断日志（即使前面失败也执行）
      # ════════════════════════════════════════════

      - name: 输出 noj-judge 日志
        if: always()
        run: |
          echo "=== noj-judge 日志 ==="
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME logs --tail=100 noj-judge 2>&1 || echo "容器可能未启动"

      - name: 输出 noj-core 日志
        if: always()
        run: |
          echo "=== noj-core 日志 ==="
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME logs --tail=100 noj-core 2>&1 || echo "容器可能未启动"

      # ════════════════════════════════════════════
      # 7. 清理
      # ════════════════════════════════════════════

      - name: 清理评测栈
        if: always()
        run: |
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME down -v
