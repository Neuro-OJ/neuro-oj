# =============================================================================
# Neuro OJ — 全链路 E2E 测试
#
# 在每个 PR 和推送到 main 时运行完整的端到端测试：
#   - noj-core  API E2E（33 个 API 测试）
#   - noj-tests 管道 E2E（5 个全链路测试）
#   - noj-judge Docker 沙箱 E2E（12 个测试）
#
# 使用 Docker Compose 编排完整评测栈（noj-core + noj-judge + PostgreSQL + Redis）。
#
# 技术栈：Deno + Node.js + Rust + Docker Compose
# 运行时间：首次 ~15min，缓存命中后 ~5-8min
# =============================================================================

name: E2E

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_PROJECT_NAME: noj-e2e
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"
  E2E_BASE_URL: http://localhost:8099
  E2E_CORE_PORT: 8099
  E2E_DB_URL: postgres://e2e:e2e@localhost:5433/e2e
  E2E_REDIS_URL: redis://localhost:6380/1
  JWT_SECRET: e2e-ci-secret
  NOJ_RUN_E2E: "1"
  DENO_DIR: ${{ github.workspace }}/noj-core/.deno_cache

jobs:
  e2e:
    name: Full Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 安装工具链 ────────────────────────────

      - name: 安装 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # ── 缓存依赖 ──────────────────────────────

      - name: 缓存 Deno 依赖
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/noj-core/.deno_cache
          key: deno-${{ hashFiles('noj-core/deno.lock') }}
          restore-keys: |
            deno-

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            noj-judge/target
          key: cargo-e2e-${{ hashFiles('noj-judge/Cargo.lock') }}
          restore-keys: |
            cargo-e2e-

      # ════════════════════════════════════════════
      # 1. 构建 Docker 镜像
      # ════════════════════════════════════════════

      - name: 构建 Docker Compose 镜像
        run: |
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME build

      # ════════════════════════════════════════════
      # 2. 启动 E2E 评测栈
      # ════════════════════════════════════════════

      - name: 启动评测栈
        run: |
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME up -d
          echo "等待 noj-core 就绪..."
          for i in $(seq 1 60); do
            if curl -sf $E2E_BASE_URL/health > /dev/null 2>&1; then
              echo "✅ noj-core 就绪"
              break
            fi
            sleep 2
          done

      # ════════════════════════════════════════════
      # 3. noj-core API E2E 测试
      # ════════════════════════════════════════════

      - name: Core E2E 测试（33 个 API 测试）
        working-directory: noj-core
        run: deno test -A tests/e2e/api.test.ts
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}

      # ════════════════════════════════════════════
      # 4. noj-tests 管道 E2E 测试
      # ════════════════════════════════════════════

      - name: 管道 E2E 测试（5 个全链路测试）
        working-directory: noj-tests
        run: deno test -A e2e/e2e.test.ts
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}

      # ════════════════════════════════════════════
      # 5. noj-judge Docker 沙箱 E2E 测试
      # ════════════════════════════════════════════

      - name: 编译 Judge E2E 测试目标
        working-directory: noj-judge
        run: |
          for target in e2e_docker_basic e2e_resource_limits e2e_security_isolation e2e_support_package; do
            echo "→ 构建 $target ..."
            cargo build --test "$target"
          done

      - name: Judge E2E 测试（12 个 Docker 沙箱测试）
        working-directory: noj-judge
        run: |
          for target in e2e_docker_basic e2e_resource_limits e2e_security_isolation e2e_support_package; do
            echo ""
            echo "───────────────────────────────────────"
            echo "  $target"
            echo "───────────────────────────────────────"
            NOJ_RUN_E2E=1 cargo test --test "$target" -- --ignored --test-threads=1
          done
        env:
          REDIS_URL: ${{ env.E2E_REDIS_URL }}

      # ════════════════════════════════════════════
      # 6. 诊断日志（即使前面失败也执行）
      # ════════════════════════════════════════════

      - name: 输出 noj-judge 日志
        if: always()
        run: |
          echo "=== noj-judge 日志 ==="
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME logs --tail=100 noj-judge 2>&1 || echo "容器可能未启动"

      - name: 输出 noj-core 日志
        if: always()
        run: |
          echo "=== noj-core 日志 ==="
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME logs --tail=100 noj-core 2>&1 || echo "容器可能未启动"

      # ════════════════════════════════════════════
      # 7. 清理
      # ════════════════════════════════════════════

      - name: 清理评测栈
        if: always()
        run: |
          docker compose -f docker-compose.e2e.yml -p $COMPOSE_PROJECT_NAME down -v
