# =============================================================================
# Neuro OJ CI Pipeline
#
# 触发条件：全分支 Push 和 Pull Request
# 并行检查三个模块：
#   - noj-core: Deno 后端（格式/代码检查/集成测试，需 PostgreSQL + Redis）
#   - noj-ui:   Nuxt 4 前端（Deno 构建检查）
#   - noj-judge: Rust Worker（格式/Clippy/单元测试）
# =============================================================================

name: CI

# workflow-level 最小权限：所有 job 默认 contents: read；如需写权限再按 job
# 单独收窄 scope。修复 finding S3：之前 GITHUB_TOKEN 默认是 write-all，
# 风险敞口包括 gh release create / gh pr comment 等不必要的写操作。
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# 同一分支/PR 的新推送自动取消旧运行，避免排队浪费。
# 修复 finding M4：之前 `cancel-in-progress: true` 对 main 推送也生效，
# 一次 force-push 就会丢失 main 分支的 CI coverage。改为仅在 PR 上取消，
# main 推送必须跑完，保留质量门禁记录。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # ===========================================================================
  # noj-core — 快速冒烟测试（不依赖外部服务，使用 PGlite 内存数据库）
  # ===========================================================================
  core-smoke:
    name: Core Smoke
    runs-on: ubuntu-latest
    # 冒烟测试是唯一真实启动 Hono server 并验证 /health 的检查，必须在 main 推送 / 手动触发也执行，
    # 不只是 PR。core-test 直接 import router 不启 server，覆盖不到 HTTP 层。
    timeout-minutes: 5

    services:
      # PR-1 评审修订：smoke 测试现在调 authMiddleware（含 isJtiRevoked），
      # 必须在 Redis 可达环境下运行。加 redis 服务容器。
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: 快速冒烟测试
        working-directory: noj-core
        env:
          REDIS_URL: redis://localhost:6379/
        run: deno task test:smoke

  # ===========================================================================
  # noj-core — Deno 格式检查（轻量，无外部服务依赖）
  # ===========================================================================
  core-fmt:
    name: Core Fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: 格式检查 (deno fmt)
        working-directory: noj-core
        run: deno fmt --check

  # ===========================================================================
  # noj-core — Deno 代码检查（轻量，无外部服务依赖）
  # ===========================================================================
  core-lint:
    name: Core Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: 代码检查 (deno lint)
        working-directory: noj-core
        run: deno lint

  # ===========================================================================
  # noj-core — 集成测试（需 PostgreSQL + Redis 服务容器）
  # ===========================================================================
  core-test:
    name: Core Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: noj
          POSTGRES_PASSWORD: noj
          POSTGRES_DB: noj
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379/
      # 真实接入 PostgreSQL 服务容器；若缺失则 00_migrate_test.ts 会静默退到 PGlite，
      # 导致 pg_trgm / tsvector / GIN 等 PG 专属路径在 PR 上从未被 CI 覆盖。
      DATABASE_URL: postgres://noj:noj@localhost:5432/noj
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DENO_DIR: ${{ github.workspace }}/noj-core/.deno_cache
      # 设置 NOJ_ENV=test 让 isRateLimitEnabled() 读 RATE_LIMIT_ENABLED=true
      # 关闭限流（避免 CI 中因跨测试限流状态导致 503）
      NOJ_ENV: test
      RATE_LIMIT_ENABLED: "false"

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # 校验 JWT_SECRET 长度 ≥32（修复 finding S7）。
      # noj-core main.ts 启动时硬校验，但 CI 在测试环节会先 launch main.ts；
      # 把校验提前到 step 层，错误信息更精准。
      - name: Validate secrets
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          if [ "${#JWT_SECRET}" -lt 32 ]; then
            echo "::error::JWT_SECRET must be ≥32 chars (got ${#JWT_SECRET})"
            exit 1
          fi

      - name: 缓存 Deno 依赖
        uses: actions/cache@v4
        with:
          # cache key 同时 hash deno.lock 和 deno.json（修复 finding P7）。
          # 原单 hashFiles('deno.lock') 在 imports map 变更时不刷新缓存，
          # 会用到旧的下载模块。
          path: ${{ github.workspace }}/noj-core/.deno_cache
          key: deno-${{ hashFiles('noj-core/deno.lock', 'noj-core/deno.json') }}
          restore-keys: |
            deno-

      - name: 运行测试 (deno test)
        working-directory: noj-core
        env:
          BCRYPT_SALT_ROUNDS: 4
        # 不加 --parallel：之前因为没设 DATABASE_URL 误走 PGlite 内存模式，单进程内
        # --parallel 不会冲突。修好 DATABASE_URL 接通真实 PG 后，多 worker 并发
        # TRUNCATE / INSERT 会导致死锁（CI 日志可见 Process 494 vs 495 互锁）。
        # 串行执行匹配现有 resetDbForTest() 的顺序假设。
        run: deno test -A

      # 失败时上传日志（修复 finding M7）。CI 默认只在 UI 里保留日志，
      # 开发者必须本地复现才能排查；改为 actions/upload-artifact 上传到
      # GitHub Actions artifacts，contributor 可直接下载查看。
      - name: 上传失败日志
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-logs
          path: |
            noj-core/test-logs/
            noj-core/test-output.log
          retention-days: 7
          if-no-files-found: ignore
        continue-on-error: true

  # ===========================================================================
  # noj-ui — Nuxt 4 前端（Deno 构建检查）
  # ===========================================================================
  ui-check:
    name: UI (Nuxt)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: 缓存 node_modules
        uses: actions/cache@v4
        with:
          # cache key 同时 hash package.json 和 lockfile（修复 finding P8）。
          # 原单 hashFiles('package.json') 在 lockfile 隐式更新时不刷缓存，
          # 会出现非确定性依赖版本。
          path: noj-ui/node_modules
          key: npm-${{ hashFiles('noj-ui/package.json', 'noj-ui/package-lock.json', 'noj-ui/pnpm-lock.yaml') }}
          restore-keys: |
            npm-

      - name: 安装依赖 (Deno BYONM)
        working-directory: noj-ui
        run: deno install

      - name: 构建检查 (deno task build)
        working-directory: noj-ui
        run: deno task build

      # 失败时上传 Nuxt 构建日志与 .output（修复 finding M7）
      - name: 上传失败日志
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: ui-check-logs
          path: |
            noj-ui/.output/logs/
            noj-ui/.nuxt/dist/
          retention-days: 7
          if-no-files-found: ignore
        continue-on-error: true

  # ===========================================================================
  # noj-judge — Rust 格式检查
  # ===========================================================================
  judge-fmt:
    name: Judge Fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: 格式检查 (cargo fmt)
        working-directory: noj-judge
        run: cargo fmt --all --check

  # ===========================================================================
  # noj-judge — Clippy 检查（含编译，禁止 warnings）
  # ===========================================================================
  judge-clippy:
    name: Judge Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            noj-judge/target
          key: cargo-${{ hashFiles('noj-judge/Cargo.lock') }}
          restore-keys: |
            cargo-

      - name: Clippy 检查 (cargo clippy)
        working-directory: noj-judge
        run: cargo clippy --all-targets -- -D warnings

      # 失败时上传 cargo 编译缓存（修复 finding M7）
      - name: 上传失败日志
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: judge-clippy-logs
          path: noj-judge/target/
          retention-days: 7
          if-no-files-found: ignore
        continue-on-error: true

  # ===========================================================================
  # noj-judge — 单元测试（复用 clippy 编译产物）
  # ===========================================================================
  judge-test:
    name: Judge Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            noj-judge/target
          key: cargo-${{ hashFiles('noj-judge/Cargo.lock') }}
          restore-keys: |
            cargo-

      - name: 运行测试 (cargo test)
        working-directory: noj-judge
        run: cargo test

      # 失败时上传 cargo test 日志
      - name: 上传失败日志
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: judge-test-logs
          path: |
            noj-judge/target/**/test-*.log
            noj-judge/target/**/deps/
          retention-days: 7
          if-no-files-found: ignore
        continue-on-error: true

  # ===========================================================================
  # noj-judge — Docker 沙箱集成测试
  #
  # 以前只跑在 workflow_dispatch，导致容器池 / 双容器协调 / 沙箱资源限制等
  # 关键路径在 push / PR 上无信号。现默认 push + 非 fork PR + manual 都跑。
  # Fork PR 仍会跑（GitHub-hosted ubuntu-latest 自带 Docker daemon），仅 cache 写入
  # 会被 GHA 静默忽略，缓存命中率下降但不影响测试正确性。
  # ===========================================================================
  judge-e2e:
    name: Judge E2E (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NOJ_RUN_E2E: "1"

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            noj-judge/target
          key: cargo-e2e-${{ hashFiles('noj-judge/Cargo.lock') }}
          restore-keys: |
            cargo-e2e-

      - name: 构建测试 Docker 镜像
        working-directory: noj-judge/tests/e2e
        run: docker build -t noj-judge-test-runner -f Dockerfile.test-runner .

      - name: 运行 E2E 集成测试
        working-directory: noj-judge
        env:
          # judge-e2e job 现在默认在 push/PR 上也跑（之前仅 workflow_dispatch）。
          # 此时仍需一个本地可达的 Redis，配合服务容器 redis:7-alpine。
          REDIS_URL: redis://localhost:6379/
        run: |
          # set -euo pipefail：任一 cargo test 失败立即终止整个 job
          set -euo pipefail
          # 与 e2e.yml 保持完全一致的 6 个目标清单（含 2026-07-02 重构后的
          # e2e_container_pool）。原 cargo test --test e2e 在没有 e2e.rs 的
          # 情况下 exit 101，从未暴露是因为 if: workflow_dispatch。
          for target in \
            e2e_docker_basic \
            e2e_resource_limits \
            e2e_security_isolation \
            e2e_support_package \
            e2e_problem_limits \
            e2e_container_pool; do
            echo "═══ $target ═══"
            NOJ_RUN_E2E=1 cargo test --test "$target" -- --ignored --test-threads=1
          done

      # 失败时上传 Docker 沙箱产物
      - name: 上传失败日志
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: judge-e2e-logs
          path: |
            noj-judge/target/**/test-*.log
          retention-days: 7
          if-no-files-found: ignore
        continue-on-error: true
