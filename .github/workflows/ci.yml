# =============================================================================
# Neuro OJ CI Pipeline
#
# 触发条件：全分支 Push 和 Pull Request
# 并行检查三个模块：
#   - noj-core: Deno 后端（格式/代码检查/集成测试，需 PostgreSQL + Redis）
#   - noj-ui:   Nuxt 4 前端（Deno 构建检查）
#   - noj-judge: Rust Worker（格式/Clippy/单元测试）
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# 同一分支/PR 的新推送自动取消旧运行，避免排队浪费
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ===========================================================================
  # noj-core — 快速冒烟测试（不依赖外部服务，使用 PGlite 内存数据库）
  # ===========================================================================
  core-smoke:
    name: Core Smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: 快速冒烟测试
        working-directory: noj-core
        run: deno task test:smoke

  # ===========================================================================
  # noj-core — Deno 格式检查（轻量，无外部服务依赖）
  # ===========================================================================
  core-fmt:
    name: Core Fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: 格式检查 (deno fmt)
        working-directory: noj-core
        run: deno fmt --check

  # ===========================================================================
  # noj-core — Deno 代码检查（轻量，无外部服务依赖）
  # ===========================================================================
  core-lint:
    name: Core Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: 代码检查 (deno lint)
        working-directory: noj-core
        run: deno lint

  # ===========================================================================
  # noj-core — 集成测试（需 PostgreSQL + Redis 服务容器）
  # ===========================================================================
  core-test:
    name: Core Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: noj
          POSTGRES_PASSWORD: noj
          POSTGRES_DB: noj
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379/
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DENO_DIR: ${{ github.workspace }}/noj-core/.deno_cache

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # 校验 JWT_SECRET 长度 ≥32（修复 finding S7）。
      # noj-core main.ts 启动时硬校验，但 CI 在测试环节会先 launch main.ts；
      # 把校验提前到 step 层，错误信息更精准。
      - name: Validate secrets
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          if [ "${#JWT_SECRET}" -lt 32 ]; then
            echo "::error::JWT_SECRET must be ≥32 chars (got ${#JWT_SECRET})"
            exit 1
          fi

      - name: 缓存 Deno 依赖
        uses: actions/cache@v4
        with:
          # cache key 同时 hash deno.lock 和 deno.json（修复 finding P7）。
          # 原单 hashFiles('deno.lock') 在 imports map 变更时不刷新缓存，
          # 会用到旧的下载模块。
          path: ${{ github.workspace }}/noj-core/.deno_cache
          key: deno-${{ hashFiles('noj-core/deno.lock', 'noj-core/deno.json') }}
          restore-keys: |
            deno-

      - name: 运行测试 (deno test)
        working-directory: noj-core
        env:
          BCRYPT_SALT_ROUNDS: 4
        run: deno test -A --parallel

  # ===========================================================================
  # noj-ui — Nuxt 4 前端（Deno 构建检查）
  # ===========================================================================
  ui-check:
    name: UI (Nuxt)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: 缓存 node_modules
        uses: actions/cache@v4
        with:
          # cache key 同时 hash package.json 和 lockfile（修复 finding P8）。
          # 原单 hashFiles('package.json') 在 lockfile 隐式更新时不刷缓存，
          # 会出现非确定性依赖版本。
          path: noj-ui/node_modules
          key: npm-${{ hashFiles('noj-ui/package.json', 'noj-ui/package-lock.json', 'noj-ui/pnpm-lock.yaml') }}
          restore-keys: |
            npm-

      - name: 安装依赖 (Deno BYONM)
        working-directory: noj-ui
        run: deno install

      - name: 构建检查 (deno task build)
        working-directory: noj-ui
        run: deno task build

  # ===========================================================================
  # noj-judge — Rust 格式检查
  # ===========================================================================
  judge-fmt:
    name: Judge Fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: 格式检查 (cargo fmt)
        working-directory: noj-judge
        run: cargo fmt --all --check

  # ===========================================================================
  # noj-judge — Clippy 检查（含编译，禁止 warnings）
  # ===========================================================================
  judge-clippy:
    name: Judge Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            noj-judge/target
          key: cargo-${{ hashFiles('noj-judge/Cargo.lock') }}
          restore-keys: |
            cargo-

      - name: Clippy 检查 (cargo clippy)
        working-directory: noj-judge
        run: cargo clippy --all-targets -- -D warnings

  # ===========================================================================
  # noj-judge — 单元测试（复用 clippy 编译产物）
  # ===========================================================================
  judge-test:
    name: Judge Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            noj-judge/target
          key: cargo-${{ hashFiles('noj-judge/Cargo.lock') }}
          restore-keys: |
            cargo-

      - name: 运行测试 (cargo test)
        working-directory: noj-judge
        run: cargo test

  # ===========================================================================
  # noj-judge — Docker 沙箱集成测试（需要 Docker daemon，手动触发）
  # ===========================================================================
  judge-e2e:
    name: Judge E2E (Docker)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    env:
      NOJ_RUN_E2E: "1"

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            noj-judge/target
          key: cargo-e2e-${{ hashFiles('noj-judge/Cargo.lock') }}
          restore-keys: |
            cargo-e2e-

      - name: 构建测试 Docker 镜像
        working-directory: noj-judge/tests/e2e
        run: docker build -t noj-judge-test-runner -f Dockerfile.test-runner .

      - name: 运行 E2E 集成测试
        working-directory: noj-judge
        run: cargo test --test e2e -- --ignored

      - name: 再次运行单元测试确认无回归
        working-directory: noj-judge
        run: cargo test
