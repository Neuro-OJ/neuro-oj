# E2E 测试基础设施（独立端口/DB，与开发环境隔离）
services:
  redis:
    image: redis:7-alpine
    container_name: noj-e2e-redis
    ports: ["6380:6379"]         # 避开开发环境的 6379

  postgres:
    image: postgres:16-alpine
    container_name: noj-e2e-postgres
    ports: ["5433:5432"]         # 避开开发环境的 5432
    environment:
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD: e2e
      POSTGRES_DB: e2e
