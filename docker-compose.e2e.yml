# E2E 测试基础设施（独立端口/DB，与开发环境隔离）
services:
  redis:
    image: redis:7-alpine
    container_name: noj-e2e-redis
    ports: ["6380:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: noj-e2e-postgres
    ports: ["5433:5432"]
    environment:
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD: e2e
      POSTGRES_DB: e2e
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "e2e"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: noj-e2e-minio
    ports: ["9002:9000"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    # 修复 finding C5：原 condition: service_started 在冷启动下过早触发，
    # mc alias set 连接偶尔被拒绝，entrypoint 里再 sleep 3 补补丁（脆弱）。
    # 改为 service_healthy 后等 minio 健康检查通过再起，sleep 3 也去掉。
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/noj-support-packages;
      "

  # ──────────────────────────────────────────────────────────────────────────
  # 拆分 prepare 步骤：把耗时 ~25-30min 的 migrate + seed 从 noj-core 容器里
  # 抽出为独立 one-shot 任务。这样 noj-core 容器只跑 HTTP server，
  # 冷启动从 ~30min 降到 ~1s，单 PR Full Pipeline 从 10-30min 降到 4-6min。
  #
  # noj-migrate 用 entrypoint "setup" 模式：migrate + seed 后退出。
  # noj-core depends_on service_completed_successfully → 等 noj-migrate 完后才起。
  # ──────────────────────────────────────────────────────────────────────────
  noj-migrate:
    build:
      context: ./noj-core
      dockerfile: Dockerfile.e2e
    image: noj-e2e-core
    container_name: noj-e2e-migrate
    entrypoint: ["/entrypoint.sh", "setup"]
    environment:
      DATABASE_URL: postgres://e2e:e2e@postgres:5432/e2e
      REDIS_URL: redis://redis:6379/1
      NOJ_RUN_E2E: "1"
      STORAGE_PROVIDER: local
      RATE_LIMIT_ENABLED: "false"
      JWT_SECRET: e2e-ci-secret-fixed-value-with-32-chars-min-abc
      ADMIN_EMAIL: e2e_admin@test.com
      ADMIN_PASS: e2e_admin_pass
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  noj-core:
    build:
      context: ./noj-core
      dockerfile: Dockerfile.e2e
    image: noj-e2e-core
    container_name: noj-e2e-core
    ports: ["8099:8000"]
    # 健康探测。noj-core 只跑 server（migrate + seed 在 noj-migrate 里跑完了），
    # 启动 < 1s，健康检查几乎立即通过；start_period/retries 调到小值即可。
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    # 关键改动：noj-core 不再自己跑 migrate + seed —— 由上游 noj-migrate one-shot
    # 提前完成。这条 entrypoint 跳过 ~25-30min 的 deno runtime 数据库初始化，
    # 直接监听 :8000。
    entrypoint: ["/entrypoint.sh", "serve"]
    environment:
      DATABASE_URL: postgres://e2e:e2e@postgres:5432/e2e
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: e2e-ci-secret-fixed-value-with-32-chars-min-abc
      PORT: "8000"
      NOJ_RUN_E2E: "1"
      STORAGE_PROVIDER: local
      RATE_LIMIT_ENABLED: "false"
      BCRYPT_SALT_ROUNDS: "4"
      # seed 管理员凭证（需与 noj-core/tests/e2e/helper.ts 默认值一致）
      ADMIN_EMAIL: e2e_admin@test.com
      ADMIN_PASS: e2e_admin_pass
    depends_on:
      noj-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  noj-judge:
    build:
      context: ./noj-judge
      dockerfile: Dockerfile.e2e
    image: noj-e2e-judge
    container_name: noj-e2e-judge
    environment:
      REDIS_URL: redis://redis:6379/1
      JUDGE_QUEUE: noj:judge:queue
      RESULT_QUEUE: noj:judge:results
      MAX_CONCURRENT: "2"
      WORK_DIR: /tmp/noj-work
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - noj-judge-work:/tmp/noj-work
    depends_on:
      redis:
        condition: service_healthy

volumes:
  noj-judge-work:
