# E2E 测试基础设施（独立端口/DB，与开发环境隔离）
services:
  redis:
    image: redis:7-alpine
    container_name: noj-e2e-redis
    ports: ["6380:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: noj-e2e-postgres
    ports: ["5433:5432"]
    environment:
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD: e2e
      POSTGRES_DB: e2e
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "e2e"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: noj-e2e-minio
    ports: ["9002:9000"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    # 修复 finding C5：原 condition: service_started 在冷启动下过早触发，
    # mc alias set 连接偶尔被拒绝，entrypoint 里再 sleep 3 补补丁（脆弱）。
    # 改为 service_healthy 后等 minio 健康检查通过再起，sleep 3 也去掉。
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/noj-support-packages;
      "

  noj-core:
    build:
      context: ./noj-core
      dockerfile: Dockerfile.e2e
    image: noj-e2e-core
    container_name: noj-e2e-core
    ports: ["8099:8000"]
    # 健康探测（修复 finding C4）。e2e.yml 用 `docker compose wait noj-core`
    # 等到该 healthcheck 通过后再跑测试，不再是脆弱的 curl 60s 超时。
    healthcheck:
      # denoland/deno:alpine 自带 busybox wget，无需安装额外工具
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      # noj-core 冷启动（runMigrations + seed + 首次 deno 包下载）实测
      # ~4min。start_period 必须大于此值，否则第一次检查就在 server up
      # 之前 → 容器被标记 unhealthy → 后续成功轮询不进 healthy 状态。
      # retries × interval = 不健康容忍窗口 = 180s，配合 start_period
      # 整体覆盖 ~7min 任何 tail 延迟；e2e.yml bash loop 上限 600s 做最后兜底。
      retries: 36
      start_period: 240s
    environment:
      DATABASE_URL: postgres://e2e:e2e@postgres:5432/e2e
      REDIS_URL: redis://redis:6379/1
      # JWT_SECRET 单一来源（修复 finding S1），与 e2e.yml workflow env、
      # env.e2e.template 完全一致；任一处改需同步另两处。≥32 字符。
      JWT_SECRET: e2e-ci-secret-fixed-value-with-32-chars-min-abc
      PORT: "8000"
      NOJ_RUN_E2E: "1"
      STORAGE_PROVIDER: local
      RATE_LIMIT_ENABLED: "false"
      BCRYPT_SALT_ROUNDS: "4"
      # seed 管理员凭证（需与 noj-core/tests/e2e/helper.ts 默认值一致）
      ADMIN_EMAIL: e2e_admin@test.com
      ADMIN_PASS: e2e_admin_pass
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  noj-judge:
    build:
      context: ./noj-judge
      dockerfile: Dockerfile.e2e
    image: noj-e2e-judge
    container_name: noj-e2e-judge
    environment:
      REDIS_URL: redis://redis:6379/1
      JUDGE_QUEUE: noj:judge:queue
      RESULT_QUEUE: noj:judge:results
      MAX_CONCURRENT: "2"
      WORK_DIR: /tmp/noj-work
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - noj-judge-work:/tmp/noj-work
    depends_on:
      redis:
        condition: service_healthy

volumes:
  noj-judge-work:
